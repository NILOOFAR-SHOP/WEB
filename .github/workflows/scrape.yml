name: Scrape Limon Products

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write   # ✅ این مهم‌ترین خط برای رفع خطای ۱۲۸

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # ✅ کل تاریخچه رو میاره، برای rebase لازمه

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py   # یا هر اسمی که فایل پایتونت هست

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref }}   # ✅ جلوگیری از non-fast-forward
          git add .
          git commit --allow-empty -m "🔄 Auto-update scraped data" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
