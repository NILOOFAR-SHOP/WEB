name: Scrape Limon Products

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -f install -y
          google-chrome --version
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run scraper (with Selenium)
        id: scraper
        run: |
          python scraper/main_selenium.py
        continue-on-error: true
        
      - name: Check if products.json exists
        id: check_file
        run: |
          if [ -f "data/products.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ products.json found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ products.json not found"
          fi
          
      - name: Commit and push changes
        if: steps.check_file.outputs.exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/products.json
          git diff --staged --quiet || git commit -m "Auto-update products data $(date +'%Y-%m-%d %H:%M')"
          git push
          
      - name: Upload artifact for manual download
        if: steps.check_file.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: products-data
          path: data/products.json
          
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ اسکرپر با خطا مواجه شد. لطفاً لاگ‌ها را بررسی کنید."
