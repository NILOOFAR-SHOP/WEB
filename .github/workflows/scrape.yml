name: Scrape Limon Products

on:
  schedule:
    - cron: '0 8 * * *'        # اجرا هر روز ساعت ۸ صبح
  workflow_dispatch:            # اجرای دستی

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run scraper
        id: scraper
        run: |
          python scraper/main.py
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true
        
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/products.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/products.json
          git commit -m "Auto-update products data $(date +'%Y-%m-%d %H:%M')"
          git push
          
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ اسکرپر با خطا مواجه شد. لطفاً لاگ‌ها را بررسی کنید."
